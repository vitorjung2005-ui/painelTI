<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TI Dashboard — Magna</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-6 font-sans">

  <audio id="som-alerta" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-3xl font-bold text-white flex items-center gap-3">🛠️ Painel Service Desk</h1>
        <p class="text-slate-400">Monitoramento em Tempo Real</p>
      </div>
      <div id="status" class="bg-slate-800 px-4 py-2 rounded border border-slate-700 text-orange-400 font-bold">Conectando...</div>
    </div>

    <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
      <table class="w-full text-left">
        <thead class="bg-slate-700/50 text-slate-300 text-xs uppercase tracking-wider">
          <tr>
            <th class="p-4">Linha</th>
            <th class="p-4">Categoria</th>
            <th class="p-4">Descrição</th>
            <th class="p-4">Operador</th>
            <th class="p-4 text-center">Ação</th>
          </tr>
        </thead>
        <tbody id="lista" class="divide-y divide-slate-700"></tbody>
      </table>
      <div id="vazio" class="p-20 text-center hidden text-slate-500">Nenhum chamado pendente ☕</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAck5mx4L0dzkcihFchV7-Oqt4fXGVyxVo",
      authDomain: "magna-service-desk.firebaseapp.com",
      projectId: "magna-service-desk",
      storageBucket: "magna-service-desk.firebasestorage.app",
      messagingSenderId: "377327792574",
      appId: "1:377327792574:web:c9b8623342b71fe89289ef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let carregado = false;

    const q = query(collection(db, "chamados_fabrica"), where("status", "==", "Aberto"));

    onSnapshot(q, (snapshot) => {
      const statusDiv = document.getElementById('status');
      statusDiv.innerText = "● ONLINE";
      statusDiv.className = "bg-green-900/20 px-4 py-2 rounded border border-green-500/50 text-green-400 font-bold";

      if (carregado) {
        snapshot.docChanges().forEach(change => {
          if (change.type === "added") {
            // Tocar Som
            document.getElementById('som-alerta').play().catch(() => console.log("Interaja com a página primeiro para ativar o som"));
            // Notificação de Desktop
            if (Notification.permission === "granted") {
              new Notification("🚨 Novo Chamado TI", { body: `Linha: ${change.doc.data().linha} - ${change.doc.data().categoria}`, icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png" });
            }
          }
        });
      }

      const lista = document.getElementById('lista');
      lista.innerHTML = "";
      
      if (snapshot.empty) document.getElementById('vazio').classList.remove('hidden');
      else document.getElementById('vazio').classList.add('hidden');

      snapshot.forEach((docSnap) => {
        const d = docSnap.data();
        lista.innerHTML += `
          <tr class="hover:bg-slate-700/30 transition-colors">
            <td class="p-4 font-bold text-blue-400">${d.linha}</td>
            <td class="p-4 text-sm">${d.categoria}</td>
            <td class="p-4 text-sm text-slate-300 italic">"${d.descricao}"</td>
            <td class="p-4 text-sm text-slate-400">${d.operador}</td>
            <td class="p-4 text-center">
              <button onclick="concluir('${docSnap.id}')" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg text-xs font-bold text-white transition-all">CONCLUIR</button>
            </td>
          </tr>`;
      });
      carregado = true;
    });

    if (Notification.permission !== "denied") Notification.requestPermission();

    window.concluir = async (id) => {
      if(confirm("Marcar como concluído?")) {
        await updateDoc(doc(db, "chamados_fabrica", id), { status: "Concluido" });
      }
    };
  </script>
</body>
</html>
